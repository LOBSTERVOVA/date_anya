<link rel="stylesheet" href="/css/departments.css" />
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<div class="container py-4" xmlns:th="http://www.thymeleaf.org">
  <a class="btn btn-link px-0 mb-3 text-decoration-none" th:href="@{/departments-lecturers}">
    <i class="bi bi-arrow-left me-1"></i> Назад к списку кафедр
  </a>

  <div class="dept-edit-header">
    <h1 class="h3 mb-0 fw-bold">Новая кафедра</h1>
  </div>

  <div class="row g-4">
    <div class="col-12 col-lg-6">
      <label class="form-label fw-semibold">Название кафедры</label>
      <input id="depName" class="form-control form-control-lg rounded-3" placeholder="Введите название" />
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold">Описание</label>
      <div id="descriptionEditor" class="bg-white border rounded mb-3" style="min-height: 300px;"></div>
    </div>
  </div>

  <div class="d-flex gap-2 mt-5 pt-5 border-top">
    <button id="createDepBtn" class="btn btn-success btn-lg rounded-pill px-4"><i class="bi bi-check-lg me-1"></i> Сохранить кафедру</button>
    <a class="btn btn-outline-secondary rounded-pill" th:href="@{/departments-lecturers}">Отмена</a>
  </div>
</div>

<script>
  (function () {
    let quill;
    function initQuill() {
      const Size = Quill.import('attributors/style/size');
      Size.whitelist = ['12px', '14px', '16px', '18px', '20px', '24px', '28px', '32px'];
      Quill.register(Size, true);
      const Font = Quill.import('attributors/class/font');
      Font.whitelist = ['druk', 'roboto', 'arial', 'times', 'monospace'];
      Quill.register(Font, true);
      quill = new Quill('#descriptionEditor', {
        theme: 'snow',
        modules: { toolbar: [
          [{ header: [1, 2, 3, false] }], [{ font: Font.whitelist }], [{ size: Size.whitelist }],
          ['bold', 'italic', 'underline'], [{ list: 'ordered' }, { list: 'bullet' }], [{ align: [] }], ['link', 'clean']
        ]}
      });
    }

    function createDepartment() {
      const name = document.getElementById('depName').value.trim();
      if (!name) { alert('Укажите название кафедры'); return; }
      fetch('/api/department', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: quill ? quill.root.innerHTML : '', rooms: [] })
      }).then(r => { if (!r.ok) throw new Error('fail'); return r.json(); })
        .then(dep => { window.location.href = `/departments/${dep.uuid}/edit`; })
        .catch(() => alert('Не удалось создать кафедру'));
    }

    document.addEventListener('DOMContentLoaded', () => {
      initQuill();
      document.getElementById('createDepBtn').addEventListener('click', createDepartment);
    });
  })();
</script>
