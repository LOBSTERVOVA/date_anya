<link rel="stylesheet" href="/css/departments.css" />
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<div class="container py-4" xmlns:th="http://www.thymeleaf.org">
  <a class="btn btn-link px-0 mb-3 text-decoration-none" th:href="@{/departments-lecturers}">
    <i class="bi bi-arrow-left me-1"></i> Назад к списку кафедр
  </a>

  <div class="dept-edit-header">
    <h1 class="h3 mb-0 fw-bold" id="deptTitle">Кафедра</h1>
  </div>

  <div class="row g-4">
    <!-- Левая колонка: описание -->
    <div class="col-12 col-lg-8">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
          <h6 class="dept-section-title"><i class="bi bi-file-text me-1"></i> Описание кафедры</h6>
          <div id="descriptionEditor" class="bg-white border rounded mb-3" style="min-height: 300px;"></div>
          <textarea id="description" class="d-none"></textarea>
        </div>
      </div>
    </div>

    <!-- Правая колонка: зав. кафедрой + состав -->
    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 mb-3">
        <div class="card-body">
          <h6 class="dept-section-title"><i class="bi bi-person-badge me-1"></i> Заведующий кафедрой</h6>
          <select id="headSelect" class="form-select"></select>
          <div id="headSaveStatus" class="form-text mt-1"></div>
        </div>
      </div>

      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <h6 class="dept-section-title mb-0"><i class="bi bi-people me-1"></i> Состав <span id="deptLecturersCount" class="badge bg-secondary ms-1"></span></h6>
            <button class="btn btn-sm btn-outline-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#createLecturerModal">
              <i class="bi bi-person-plus"></i> Добавить
            </button>
          </div>
          <div id="deptLecturersCards" class="d-flex flex-column gap-2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2 mt-4 pt-4 border-top">
    <button id="saveBtn" class="btn btn-primary px-4 rounded-pill"><i class="bi bi-check-lg me-1"></i> Сохранить</button>
    <a class="btn btn-outline-secondary rounded-pill" th:href="@{/departments-lecturers}">Отмена</a>
  </div>
</div>

<!-- Modal: Create Lecturer -->
<div class="modal fade" id="createLecturerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Новый преподаватель</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-2">
          <div class="col-6"><label class="form-label small fw-medium">Фамилия</label><input id="newLastName" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Имя</label><input id="newFirstName" class="form-control" /></div>
          <div class="col-12"><label class="form-label small fw-medium">Отчество</label><input id="newPatronymic" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Учёное звание</label>
            <select id="newAcademicTitle" class="form-select">
              <option value="">— Не указано —</option>
              <option value="PROFESSOR">Профессор</option><option value="DOCENT">Доцент</option>
              <option value="SENIOR_LECTURER">Ст. преподаватель</option><option value="LECTURER">Преподаватель</option>
              <option value="EDUCATIONAL_METHODOLOGIST">Методист</option>
            </select>
          </div>
          <div class="col-6"><label class="form-label small fw-medium">Дата рождения</label><input id="newBirthDate" type="date" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Телефон</label><input id="newPhone" class="form-control" placeholder="+7..." /></div>
          <div class="col-6"><label class="form-label small fw-medium">Email</label><input id="newEmail" type="email" class="form-control" placeholder="name@example.com" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Аудитория</label><input id="newRoom" class="form-control" placeholder="А-101" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Учёная степень</label><input id="newAcademicDegree" class="form-control" placeholder="к.т.н." /></div>
          <div class="col-12"><label class="form-label small fw-medium">URL аватарки</label><input id="newAvatar" type="url" class="form-control" /></div>
          <div class="col-12"><label class="form-label small fw-medium">Описание</label><textarea id="newDescription" class="form-control" rows="2"></textarea></div>
          <div class="col-12 form-check mt-1"><input id="newLabHead" type="checkbox" class="form-check-input" /><label for="newLabHead" class="form-check-label small">Зав. лабораторией</label></div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Отмена</button>
        <button type="button" id="createLecturerBtn" class="btn btn-primary rounded-pill">Создать</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Edit Lecturer -->
<div class="modal fade" id="editLecturerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Редактировать преподавателя</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-2">
          <div class="col-6"><label class="form-label small fw-medium">Фамилия</label><input id="editLastName" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Имя</label><input id="editFirstName" class="form-control" /></div>
          <div class="col-12"><label class="form-label small fw-medium">Отчество</label><input id="editPatronymic" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Учёное звание</label>
            <select id="editAcademicTitle" class="form-select">
              <option value="">— Не указано —</option>
              <option value="PROFESSOR">Профессор</option><option value="DOCENT">Доцент</option>
              <option value="SENIOR_LECTURER">Ст. преподаватель</option><option value="LECTURER">Преподаватель</option>
              <option value="EDUCATIONAL_METHODOLOGIST">Методист</option>
            </select>
          </div>
          <div class="col-6"><label class="form-label small fw-medium">Дата рождения</label><input id="editBirthDate" type="date" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Телефон</label><input id="editPhone" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Email</label><input id="editEmail" type="email" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Аудитория</label><input id="editRoom" class="form-control" /></div>
          <div class="col-6"><label class="form-label small fw-medium">Учёная степень</label><input id="editAcademicDegree" class="form-control" /></div>
          <div class="col-12"><label class="form-label small fw-medium">URL аватарки</label><input id="editAvatar" type="url" class="form-control" /></div>
          <div class="col-12"><label class="form-label small fw-medium">Описание</label><textarea id="editDescription" class="form-control" rows="2"></textarea></div>
          <div class="col-12 form-check mt-1"><input id="editLabHead" type="checkbox" class="form-check-input" /><label for="editLabHead" class="form-check-label small">Зав. лабораторией</label></div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Отмена</button>
        <button type="button" id="editLecturerSaveBtn" class="btn btn-primary rounded-pill">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  window.__deptUuid = /*[[${departmentUuid}]]*/ null;
</script>
<script type="module" src="/js/pages/departments/departments-edit.js"></script>
