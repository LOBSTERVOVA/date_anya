<section id="reference-page" class="container py-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="m-0">Справочная информация</h1>
    <div class="d-flex gap-2">
      <button id="ref-back-to-themes" type="button" class="btn btn-outline-secondary d-none">
        <i class="bi bi-arrow-left me-1"></i> К темам
      </button>
      <button id="ref-open-create" type="button" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i> Новая справка
      </button>
    </div>
  </div>

  <!-- Грид тем -->
  <div id="ref-themes-grid" class="row g-3">
    <!-- JS заполнит карточки тем -->
  </div>

  <!-- Список справок в теме -->
  <div id="ref-theme-view" class="d-none">
    <h3 id="ref-theme-title" class="mb-3"></h3>
    <div id="ref-items-list" class="d-flex flex-column gap-3"></div>
  </div>

  <!-- Модал создания справки -->
  <div id="ref-create-modal" class="modal" tabindex="-1" style="display:none;">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Создание справки</h5>
          <button type="button" class="btn-close" id="ref-create-close" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Тематика (theme)</label>
              <input id="ref-theme-input" class="form-control" placeholder="Например: Расписание, Стипендии..." />
              <div class="form-text">Можно выбрать существующую тему, щёлкнув по карточке, или ввести новую.</div>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Уровень важности (1..3)</label>
              <input id="ref-importance" class="form-control" type="number" min="1" max="3" value="1" />
            </div>
            <div class="col-12">
              <label class="form-label">Заголовок</label>
              <input id="ref-title" class="form-control" placeholder="Короткое название" />
            </div>
            <div class="col-12">
              <label class="form-label">Краткая аннотация</label>
              <textarea id="ref-annotation" class="form-control" rows="3" placeholder="Короткое описание, которое будет показываться в списках"></textarea>
              <div class="form-text">Опционально: краткое описание/тизер.</div>
            </div>
            <div class="col-12">
              <label class="form-label">Содержимое (HTML)</label>
              <div id="ref-editor" class="bg-white border rounded" style="min-height: 260px;"></div>
            </div>
            <div class="col-12 mt-5 pt-5">
              <div class="d-flex align-items-center justify-content-between">
                <label class="form-label mb-2">Периоды особой актуальности</label>
                <button id="ref-actualDates-add" type="button" class="btn btn-sm btn-outline-primary">
                  <i class="bi bi-plus-lg"></i> Добавить диапазон
                </button>
              </div>
              <div id="ref-actualDates-list" class="d-flex flex-column gap-2 mt-2"></div>
              <div class="form-text">Укажите один или несколько периодов.</div>
            </div>
          </div>
        </div>
        <div class="modal-footer pt-5">
          <button type="button" class="btn btn-secondary" id="ref-create-cancel">Отмена</button>
          <button type="button" class="btn btn-success" id="ref-create-save">Сохранить</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
  #ref-editor .ql-editor { font-family: 'Roboto', Arial, sans-serif; font-size: 16px; line-height: 1.6; }
  #ref-items-list .ref-item .ref-title { font-weight: 600; }
  #ref-items-list .ref-item .ref-html img { max-width: 100%; height: auto; border-radius: 8px; }
  #ref-actualDates-list .date-range-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
  @media (max-width: 576px) { #ref-actualDates-list .date-range-row { grid-template-columns: 1fr; } }
</style>
<script type="module" src="/js/pages/reference.js"></script>
