<link rel="stylesheet" href="/css/departments.css" />

<div class="container py-4">
  <div class="dept-page-header d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
    <div>
      <h1 class="h3 mb-1 fw-bold">Кафедры и преподаватели</h1>
      <p class="mb-0 opacity-75" id="dept-total">Загрузка...</p>
    </div>
    <a class="btn btn-light btn-lg rounded-pill px-4 fw-semibold shadow-sm" href="/departments/new">
      <i class="bi bi-plus-lg me-1"></i> Новая кафедра
    </a>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="position-relative flex-grow-1 me-3" style="max-width: 420px;">
      <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
      <input id="deptSearch" class="form-control dept-search ps-5" type="search" placeholder="Поиск кафедр..." autocomplete="off" />
    </div>
  </div>

  <div id="departmentsList" class="row g-3"></div>
  <div id="deptEmpty" class="dept-empty text-center py-5 text-muted" style="display:none;">
    <i class="bi bi-building" style="font-size:3rem;"></i>
    <p class="mt-2">Кафедры не найдены</p>
  </div>
</div>

<script type="module" src="/js/pages/departments/departments-lecturers.js"></script>
