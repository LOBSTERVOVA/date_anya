<div xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="header">

        <i class="bi bi-building text-white fs-5"></i>
      </div>
      <div class="d-flex flex-column lh-sm">
        <span class="fw-bold text-dark" style="font-size:1.05rem;">Российский</span>
        <span class="text-muted" style="font-size:.7rem;">университет спорта</span>
      </div>
    </a>

    <!-- Бургер -->
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Меню">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Навигация -->
    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav align-items-lg-center gap-lg-1 ms-auto">
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-pill fw-medium" th:classappend="${active}=='schedule' ? ' active' : ''" th:href="@{/schedule}">
            <i class="bi bi-calendar-week me-1 d-lg-none"></i>Расписание
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-pill fw-medium" th:classappend="${active}=='workload' ? ' active' : ''" th:href="@{/workload}">
            <i class="bi bi-graph-up me-1 d-lg-none"></i>Нагрузка
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-pill fw-medium" th:classappend="${active}=='news' ? ' active' : ''" th:href="@{/news}">
            <i class="bi bi-newspaper me-1 d-lg-none"></i>Новости
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 py-2 rounded-pill fw-medium" th:classappend="${active}=='departments-lecturers' ? ' active' : ''" th:href="@{/departments-lecturers}">
            <i class="bi bi-people me-1 d-lg-none"></i>Кафедры
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link px-3 py-2 rounded-pill fw-medium dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false"
             th:classappend="${active}=='community' ? ' active' : ''">

          </a>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 mt-2 p-2">
            <li><a class="dropdown-item rounded-3 py-2 px-3" th:href="@{/community/sports-sections}"><i class="bi bi-trophy me-2 text-primary"></i>Спортивные секции</a></li>
            <li><a class="dropdown-item rounded-3 py-2 px-3" th:href="@{/community/science-clubs}"><i class="bi bi-lightbulb me-2 text-warning"></i>Научные кружки</a></li>
            <li><a class="dropdown-item rounded-3 py-2 px-3" th:href="@{/community/sport-events}"><i class="bi bi-calendar-event me-2 text-success"></i>Спортивные мероприятия</a></li>
            <li><hr class="dropdown-divider my-1" /></li>
            <li><a class="dropdown-item rounded-3 py-2 px-3" th:href="@{/community/canteen-menu}"><i class="bi bi-cup-hot me-2 text-danger"></i>Меню столовой</a></li>

        <li class="nav-item">

      <!-- Блок авторизации -->
      <div class="d-flex align-items-center ms-lg-3 mt-2 mt-lg-0">
        <!-- НЕ залогинен: кнопка Войти -->
        <div sec:authorize="!isAuthenticated()" class="w-100 d-flex justify-content-lg-end">
          <button class="btn btn-primary rounded-pill px-3 py-1 d-flex align-items-center gap-2" id="header-login-btn"
                  data-bs-toggle="modal" data-bs-target="#login-modal">
            <i class="bi bi-box-arrow-in-right"></i>
            <span class="d-none d-sm-inline">Войти</span>
          </button>
        </div>

        <!-- Залогинен: аватарка + меню -->
        <div sec:authorize="isAuthenticated()" class="dropdown" id="header-user-menu">
          <button class="btn btn-link text-decoration-none p-0 d-flex align-items-center gap-2 dropdown-toggle"
                  type="button" data-bs-toggle="dropdown" aria-expanded="false" id="user-avatar-btn">
            <div class="user-avatar rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                 id="user-avatar-circle"
                 style="width:38px; height:38px; background:linear-gradient(135deg,#2563eb,#1d4ed8); font-size:0.85rem;">
            </div>
            <span class="d-none d-md-inline text-dark fw-medium" id="user-display-name" style="font-size:.9rem;"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-3 mt-2 p-2" style="min-width:200px;">
            <li>
              <div class="px-3 py-2">
                <div class="fw-medium text-dark" id="user-full-name-dropdown"></div>
                <div class="text-muted small" id="user-role-dropdown"></div>
              </div>
            </li>
            <li><hr class="dropdown-divider my-1" /></li>
            <li>
              <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="dropdown-item rounded-3 py-2 px-3 text-danger">
                  <i class="bi bi-box-arrow-right me-2"></i>Выйти
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Отступ чтобы контент не залезал под fixed-хедер -->
<div style="height:72px;"></div>

<!-- ====== Модалка логина ====== -->
<div class="modal fade" id="login-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Вход</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-2">
        <form id="login-form" th:action="@{/login}" method="post">
          <div class="mb-3">
            <label for="login-username" class="form-label small fw-medium">Логин (email)</label>
            <input type="text" class="form-control" id="login-username" name="username"
                   placeholder="admin@rus.ru" required autocomplete="username" autofocus />
          </div>
          <div class="mb-3">
            <label for="login-password" class="form-label small fw-medium">Пароль</label>
            <input type="password" class="form-control" id="login-password" name="password"
                   placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <div id="login-error" class="alert alert-danger py-2 small d-none"></div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-medium">
            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // Заполняем аватарку и имя, если пользователь залогинен
    const appUser = window.user;
    if (appUser && appUser.username) {
      const firstName = appUser.firstName || '';
      const lastName = appUser.lastName || '';
      const initials = (lastName.charAt(0) + firstName.charAt(0)).toUpperCase() || '?';
      const displayName = (lastName && firstName) ? `${lastName} ${firstName.charAt(0)}.` : appUser.username;

      const avatar = document.getElementById('user-avatar-circle');
      if (avatar) avatar.textContent = initials;

      const nameEl = document.getElementById('user-display-name');
      if (nameEl) nameEl.textContent = displayName;

      const fullNameEl = document.getElementById('user-full-name-dropdown');
      if (fullNameEl) fullNameEl.textContent = `${lastName} ${firstName}` + (appUser.patronymic ? ` ${appUser.patronymic}` : '');

      const roleEl = document.getElementById('user-role-dropdown');
      if (roleEl) {
        const roleLabels = { ADMIN: 'Администратор', MODERATOR: 'Модератор', DEPARTMENT_ADMIN: 'Админ кафедры', LECTURER: 'Преподаватель', STUDENT: 'Студент' };
        roleEl.textContent = roleLabels[appUser.role] || appUser.role || '';
      }
    }

    // При ошибке логина (если есть параметр ?error в URL)
    if (window.location.search.includes('error')) {
      setTimeout(function() {
        const modal = new bootstrap.Modal(document.getElementById('login-modal'));
        modal.show();
        const errEl = document.getElementById('login-error');
        if (errEl) {
          errEl.textContent = 'Неверный логин или пароль';
          errEl.classList.remove('d-none');
        }
      }, 200);
    }
  })();
</script>
