<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Идеи для свиданий ♥︎</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fbe9f0 0%, #ffe6f0 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      color: #2c1810;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d44c2f, #b23c2a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #7a4a3a;
      font-weight: 500;
    }

    .ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .idea-card {
      background: rgba(255, 250, 245, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 1.8rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
      transition: all 0.25s ease;
      border: 1px solid rgba(255, 245, 235, 0.8);
    }

    .idea-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 40px -16px rgba(100, 40, 20, 0.25);
    }

    .idea-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .idea-title {
      font-size: 1.7rem;
      font-weight: 700;
      color: #c2412c;
      margin-bottom: 0.75rem;
      letter-spacing: -0.3px;
    }

    .idea-desc {
      color: #3e2a24;
      line-height: 1.4;
      margin-bottom: 1.25rem;
      font-weight: 500;
    }

    .idea-details {
      background: #fff3ed;
      padding: 0.9rem;
      border-radius: 1.2rem;
      margin: 1rem 0;
      font-size: 0.9rem;
      color: #5c3a2c;
    }

    .choice-btn {
      background: #f0d9d0;
      border: none;
      width: 100%;
      padding: 0.8rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: #b1432c;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.8rem;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .choice-btn:hover {
      background: #e6c8bc;
      transform: scale(0.98);
      color: #8f2f1a;
    }

    .choice-btn.liked {
      background: #e6aaa0;
      color: #7a2a1a;
    }

    .feedback-section {
      background: rgba(255, 248, 242, 0.95);
      border-radius: 2rem;
      padding: 2rem;
      max-width: 620px;
      margin: 0 auto 2rem auto;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
      border: 1px solid #ffe4d6;
    }

    .feedback-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #bb3e26;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .email-input {
      width: 100%;
      padding: 1rem;
      border-radius: 2rem;
      border: 1px solid #ffcfbf;
      background: white;
      font-size: 1rem;
      font-family: inherit;
      margin: 1rem 0;
      transition: 0.2s;
    }

    .email-input:focus {
      outline: none;
      border-color: #c2412c;
      box-shadow: 0 0 0 3px rgba(194, 65, 44, 0.2);
    }

    .send-feedback {
      background: #2a9d8f;
      color: white;
      border: none;
      padding: 0.9rem 1.8rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      font-family: inherit;
    }

    .send-feedback:hover {
      background: #21867a;
      transform: translateY(-2px);
    }

    .send-feedback:disabled {
      background: #95b5af;
      cursor: not-allowed;
      transform: none;
    }

    .escape-btn {
      background: #2c1a14;
      color: #ffcfbf;
      border: 1px solid #ffbca3;
      padding: 14px 22px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.1s ease;
      width: 300px;
      text-align: center;
      font-family: inherit;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.3px;
    }

    .escape-btn:hover {
      background: #3a251e;
    }

    .button-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0 1rem;
      position: relative;
      min-height: 90px;
    }

    .toast-msg {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #2c1810e6;
      backdrop-filter: blur(8px);
      color: #fff0e6;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 500;
      z-index: 1000;
      transition: opacity 0.2s;
      pointer-events: none;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      color: #b4816e;
      font-weight: 500;
    }

    @media (max-width: 720px) {
      body {
        padding: 1rem;
      }
      .hero h1 {
        font-size: 2.2rem;
      }
      .escape-btn {
        width: 260px;
        font-size: 1rem;
      }
    }

    /* диалоговые окна */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .dialog-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .dialog-box {
      background: #fff8f4;
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: dialogPop 0.35s ease;
    }
    @keyframes dialogPop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .dialog-box h2 {
      font-size: 2rem;
      color: #c2412c;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }
    .dialog-box button {
      background: #2a9d8f;
      color: white;
      border: none;
      padding: 0.8rem 2.5rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s;
    }
    .dialog-box button:hover {
      background: #21867a;
      transform: translateY(-2px);
    }

  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>✨ свидание ✨</h1>
    <p>выбери то, что звучит заманчиво</p>
  </div>

  <div class="ideas-grid" id="ideasGrid"></div>

  <div class="feedback-section">
    <div class="feedback-title">
      <span>📬</span> поделись мыслями
    </div>
    <p style="margin-bottom: 0.5rem;">напиши что думаешь о вариантах, и я пришлю подборку на почту 💌</p>
<!--    <input type="email" id="feedbackEmail" class="email-input" placeholder="твоя почта" autocomplete="off">-->
    <textarea id="feedbackMessage" rows="3" class="email-input" style="border-radius: 1.5rem;" placeholder="например: мне понравился теннис, но хочу добавить пикник..."></textarea>
    <button id="sendFeedbackBtn" class="send-feedback">📧 отправить отзыв</button>
  </div>

  <div class="button-container" id="escapeContainer">
    <button id="escapeBtn" class="escape-btn">🤕 У меня болит голова, не хочу на свидание</button>
  </div>
</div>

  <!-- диалог «Да ты че?!» -->
  <div class="dialog-overlay" id="choiceDialog">
    <div class="dialog-box">
      <h2>Да ты че?!<br>Базара нет)</h2>
      <button onclick="document.getElementById('choiceDialog').classList.remove('show')">😎 понял, принял</button>
    </div>
  </div>

  <!-- диалог «Да ну нет:D» -->
  <div class="dialog-overlay" id="escapeDialog">
    <div class="dialog-box">
      <h2>Да ну нет:D</h2>
      <button onclick="document.getElementById('escapeDialog').classList.remove('show')">😼 ладно-ладно</button>
    </div>
  </div>

<script>
  const ideas = [
    {
      icon: "🏓",
      title: "Теннис / бадминтон в парке",
      description: "Активный отдых + лёгкая конкуренция. Можно взять ракетки напрокат.",
      details: "📍 Парк Горького (прокат теннисных кортов) или Парк Кузьминки — отличные аллеи для бадминтона."
    },
    {
      icon: "🎬",
      title: "Кино-вечер",
      description: "Выбираем жанр и смотрим, что сейчас в прокате. Добавим попкорн и обсуждение.",
      details: "🎞️ Сейчас в кино: фантастика, драма, комедия. Напиши какой жанр предпочитаешь — подберём сеанс."
    },
    {
      icon: "🚲",
      title: "Велопрогулка",
      description: "С ветерком по набережным или паркам. Атмосферно и бодрит.",
      details: "Маршруты: Воробьёвы горы → набережная / Сокольники. Можно взять велик в аренду."
    },
    {
      icon: "🎨",
      title: "Мастер-класс для двоих",
      description: "Рисование, гончарное дело или приготовление пиццы — создадим что-то вместе.",
      details: "Студии: гончарная, арт-пространство, школа кулинарии. Свидание с результатом!"
    },
    {
      icon: "🧩",
      title: "Настолки или антикафе",
      description: "Настольные игры. Лёгкая атмосфера и смех.",
      details: "Антикафе с огромным выбором настолок, чай и печеньки. Можно прийти вдвоём или найти команду."
    },
    {
      icon: "🌿",
      title: "Пикник с видом",
      description: "Плед, термос с чаем/какао и красивые виды Москвы.",
      details: "Локации: Воробьёвы горы, Парк Зарядье, усадьба Коломенское. Тёплый плед и разговоры."
    }
  ];

  // трекинг выбранных идей
  const likedIdeas = [];

  const grid = document.getElementById('ideasGrid');
  function renderIdeas() {
    grid.innerHTML = '';
    ideas.forEach(idea => {
      const card = document.createElement('div');
      card.className = 'idea-card';
      card.innerHTML = `
        <div class="idea-icon">${idea.icon}</div>
        <div class="idea-title">${idea.title}</div>
        <div class="idea-desc">${idea.description}</div>
        <div class="idea-details">${idea.details}</div>
        <button class="choice-btn" data-idea="${idea.title.replace(/'/g, "\\'")}">❤️ да, мне нравится ❤️</button>
      `;
      grid.appendChild(card);
    });

    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const ideaTitle = btn.getAttribute('data-idea');
        btn.classList.toggle('liked');

        if (btn.classList.contains('liked')) {
          likedIdeas.push(ideaTitle);
          // диалог «Да ты че?!»
          document.getElementById('choiceDialog').classList.add('show');
          // отправка выбора на почту
          fetch('/api/choice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idea: ideaTitle })
          }).then(r => r.json()).then(d => {
            console.log('[LOG] 💘 Выбор отправлен:', ideaTitle, d);
          }).catch(err => {
            console.error('[LOG] ❌ Ошибка отправки выбора:', err);
          });
        } else {
          const idx = likedIdeas.indexOf(ideaTitle);
          if (idx > -1) likedIdeas.splice(idx, 1);
        }

        btn.closest('.idea-card').style.transform = 'scale(0.98)';
        setTimeout(() => {
          btn.closest('.idea-card').style.transform = '';
        }, 200);
      });
    });
  }
  renderIdeas();

  // ---- УБЕГАЮЩАЯ КНОПКА -------
  const escapeBtn = document.getElementById('escapeBtn');
  const container = document.getElementById('escapeContainer');

  let escapeHoverCount = 0;

  function getRandomPosition(btnEl, containerEl, minDistance) {
    const containerRect = containerEl.getBoundingClientRect();
    const btnRect = btnEl.getBoundingClientRect();
    const maxX = containerRect.width - btnRect.width;
    const maxY = containerRect.height - btnRect.height;

    // текущая позиция кнопки
    const currentLeft = parseFloat(btnEl.style.left) || 0;
    const currentTop = parseFloat(btnEl.style.top) || 0;

    // пробуем до 50 раз найти позицию с минимальной дистанцией
    for (let attempt = 0; attempt < 50; attempt++) {
      let x = Math.random() * maxX;
      let y = Math.random() * maxY;
      x = Math.min(Math.max(x, 4), maxX - 4);
      y = Math.min(Math.max(y, 4), maxY - 4);

      if (!minDistance) return { x, y };

      const dx = x - currentLeft;
      const dy = y - currentTop;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist >= minDistance) return { x, y };
    }
    // fallback: просто случайная
    let x = Math.random() * maxX;
    let y = Math.random() * maxY;
    x = Math.min(Math.max(x, 4), maxX - 4);
    y = Math.min(Math.max(y, 4), maxY - 4);
    return { x, y };
  }

  function moveButton() {
    if (!escapeBtn || !container) return;
    // первые 6 раз — минимум 300px
    const minDist = escapeHoverCount < 6 ? 300 : null;
    const pos = getRandomPosition(escapeBtn, container, minDist);
    escapeBtn.style.position = 'absolute';
    escapeBtn.style.left = `${pos.x}px`;
    escapeBtn.style.top = `${pos.y}px`;
  }

  let moveTimeout = null;

  escapeBtn.addEventListener('mouseenter', () => {
    escapeHoverCount++;
    console.log('[LOG] 😼 Попытка поймать кнопку #' + escapeHoverCount + ' (мин. дистанция: ' + (escapeHoverCount <= 6 ? '300px' : 'любая') + ')');
    if (moveTimeout) clearTimeout(moveTimeout);
    moveTimeout = setTimeout(() => {
      moveButton();
      const scale = 0.98 + Math.random() * 0.04;
      escapeBtn.style.transform = `scale(${scale})`;
      setTimeout(() => { if(escapeBtn) escapeBtn.style.transform = ''; }, 120);
    }, 10);
  });

  escapeBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    escapeHoverCount++;
    moveButton();
    showToast('😵 ай! я убегаю!');
  });

  escapeBtn.addEventListener('click', () => {
    document.getElementById('escapeDialog').classList.add('show');
    setTimeout(() => {
      if(escapeBtn) {
        escapeBtn.style.position = 'relative';
        escapeBtn.style.left = 'auto';
        escapeBtn.style.top = 'auto';
        escapeBtn.style.transform = '';
      }
    }, 300);
  });

  window.addEventListener('resize', () => {
    if (escapeBtn && escapeBtn.style.position === 'absolute') {
      moveButton();
    }
  });

  setTimeout(() => {
    if (escapeBtn && container) {
      if (getComputedStyle(container).position !== 'relative') {
        container.style.position = 'relative';
      }
      escapeBtn.style.position = 'relative';
    }
  }, 100);

  // ---- ОТПРАВКА ФИДБЕКА НА БЭКЕНД ----
  const sendBtn = document.getElementById('sendFeedbackBtn');
  const emailInput = document.getElementById('feedbackEmail');
  const messageInput = document.getElementById('feedbackMessage');

  async function sendFeedback(email, feedbackText) {
    if (!email || !email.includes('@')) {
      showToast('✉️ нужен корректный email, чтобы я мог ответить!');
      return;
    }
    if (!feedbackText || feedbackText.trim().length < 3) {
      showToast('💬 напиши пару слов о вариантах или добавь пожелание :)');
      return;
    }

    const ideasSummary = likedIdeas.length ? likedIdeas.join(', ') : 'ничего не выбрано';

    console.log('[LOG] 📧 Отправка отзыва. Почта:', email, 'Идеи:', ideasSummary, 'Текст:', feedbackText);

    sendBtn.disabled = true;
    sendBtn.textContent = '⏳ отправляю...';

    try {
      const res = await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          message: feedbackText,
          ideas: ideasSummary
        })
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        console.log('[LOG] ✅ Отзыв успешно отправлен:', data);
        showToast(`✨ ${data.message}`);
        messageInput.value = '';
        emailInput.value = '';
        likedIdeas.length = 0;
        document.querySelectorAll('.choice-btn.liked').forEach(b => b.classList.remove('liked'));
      } else {
        console.error('[LOG] ❌ Сервер вернул ошибку:', data);
        showToast('🕯️ ' + (data.message || 'что-то пошло не так, попробуй ещё раз'));
      }
    } catch (err) {
      console.error('[LOG] ❌ Ошибка сети при отправке отзыва:', err);
      showToast('🕯️ ой, ошибка связи. Но идеи тебя очень ждут! Попробуй ещё разок');
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = '📧 отправить отзыв';
    }
  }

  sendBtn.addEventListener('click', () => {
    sendFeedback(emailInput.value.trim(), messageInput.value.trim());
  });

  // Ctrl+Enter для отправки
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) {
      sendFeedback(emailInput.value.trim(), messageInput.value.trim());
    }
  });

  function showToast(text, duration = 3200) {
    let existingToast = document.querySelector('.toast-msg');
    if(existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerText = text;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 400);
    }, duration);
  }

  // анимация появления карточек
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.idea-card').forEach(card => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    card.style.transition = 'opacity 0.4s, transform 0.3s';
    observer.observe(card);
  });
</script>
</body>
</html>
